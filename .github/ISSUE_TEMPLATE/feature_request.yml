name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see. The more context you provide, the easier it is to evaluate.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about?

  - type: dropdown
    id: scope
    attributes:
      label: Affected component
      options:
        - nexus-engine (API/server)
        - nexus-cli (operator CLI)
        - nexus-node-agent (networking)
        - nexus-installer (setup)
        - Documentation
        - CI/CD
        - Other
